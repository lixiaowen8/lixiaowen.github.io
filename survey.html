<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大学生线上学习问卷+数据分析系统</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;font-family: "微软雅黑"}
        .container{width: 75%;margin: 30px auto;padding: 30px;border: 1px solid #eee;border-radius: 12px;box-shadow: 0 0 10px #f0f0f0}
        h2{text-align: center;margin-bottom: 25px;color: #222}
        .question{margin: 20px 0;padding-bottom: 15px;border-bottom: 1px solid #eee}
        .q-title{font-weight: bold;margin-bottom:10px;font-size:16px}
        .option{margin:8px 0;cursor:pointer}
        textarea{width:100%;height:80px;padding:8px;margin-top:8px}
        .btn-group{display:flex;gap:10px;margin-top:20px}
        button{flex:1;height:45px;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        #submitBtn{background:#007bff;color:white}
        #submitBtn:hover{background:#0056b3}
        #analysisBtn{background:#28a745;color:white}
        #analysisBtn:hover{background:#218838}
        .tip{margin-top:15px;color:green;text-align:center;display:none}
        /* 数据分析面板样式 */
        #analysisPanel{margin-top:30px;padding:20px;border:1px solid #ddd;border-radius:8px;display:none}
        table{width:100%;border-collapse: collapse;margin:15px 0}
        table th,table td{border:1px solid #ccc;padding:10px;text-align:center}
        table th{background:#f5f5f5}
        .analysis-title{font-size:18px;font-weight:bold;margin:20px 0 10px 0}
        #exportBtn{background:#ffc107;color:#000;margin-top:10px}
    </style>
</head>
<body>
<div class="container">
    <h2>大学生线上学习体验调查问卷</h2>
    <div class="question">
        <div class="q-title">1. 你的年级？</div>
        <div class="option"><input type="radio" name="grade" value="大一"> 大一</div>
        <div class="option"><input type="radio" name="grade" value="大二"> 大二</div>
        <div class="option"><input type="radio" name="grade" value="大三"> 大三</div>
        <div class="option"><input type="radio" name="grade" value="大四"> 大四</div>
    </div>
    <div class="question">
        <div class="q-title">2. 每周线上课程时长？</div>
        <div class="option"><input type="radio" name="time" value="0-5h"> 0-5小时</div>
        <div class="option"><input type="radio" name="time" value="5-10h"> 5-10小时</div>
        <div class="option"><input type="radio" name="time" value="10-15h"> 10-15小时</div>
        <div class="option"><input type="radio" name="time" value="15h以上"> 15小时以上</div>
    </div>
    <div class="question">
        <div class="q-title">3. 线上课堂学习效果自评？</div>
        <div class="option"><input type="radio" name="effect" value="很差"> 很差</div>
        <div class="option"><input type="radio" name="effect" value="一般"> 一般</div>
        <div class="option"><input type="radio" name="effect" value="良好"> 良好</div>
        <div class="option"><input type="radio" name="effect" value="优秀"> 优秀</div>
    </div>
    <div class="question">
        <div class="q-title">4. 线上学习最大阻碍（多选）</div>
        <div class="option"><input type="checkbox" name="block" value="网络卡顿"> 网络卡顿</div>
        <div class="option"><input type="checkbox" name="block" value="自制力差"> 自制力差容易走神</div>
        <div class="option"><input type="checkbox" name="block" value="互动不足"> 师生互动不足</div>
        <div class="option"><input type="checkbox" name="block" value="设备问题"> 电子设备老旧</div>
    </div>
    <div class="question">
        <div class="q-title">5. 对线上教学改进建议（简答）</div>
        <textarea id="suggest" placeholder="请输入你的建议..."></textarea>
    </div>

    <div class="btn-group">
        <button id="submitBtn" onclick="submitForm()">提交问卷</button>
        <button id="analysisBtn" onclick="showAnalysis()">查看数据分析统计</button>
    </div>
    <div class="tip" id="success">提交成功！数据已本地保存</div>

    <!-- 数据分析展示面板 -->
    <div id="analysisPanel">
        <h2>问卷数据统计分析报告</h2>
        <p id="totalNum"></p>
        <div id="gradeTable"></div>
        <div id="timeTable"></div>
        <div id="effectTable"></div>
        <div id="blockTable"></div>
        <button id="exportBtn" onclick="exportDataFile()">导出全部答卷数据（可导入Excel）</button>
    </div>
</div>

<script>
// 全局读取本地存储的问卷数据
function getSurveyList(){
    return JSON.parse(localStorage.getItem("surveyList")) || [];
}
// 1. 问卷提交函数
function submitForm(){
    const grade = document.querySelector('input[name="grade"]:checked')?.value;
    const time = document.querySelector('input[name="time"]:checked')?.value;
    const effect = document.querySelector('input[name="effect"]:checked')?.value;
    const blockList = [];
    document.querySelectorAll('input[name="block"]:checked').forEach(item=>blockList.push(item.value));
    const suggest = document.getElementById("suggest").value;

    if(!grade || !time || !effect){
        alert("请完成全部单选题目！");
        return;
    }
    const surveyData = {grade, time, effect, blockList, suggest, submitTime: new Date().toLocaleString()};
    let allData = getSurveyList();
    allData.push(surveyData);
    localStorage.setItem("surveyList", JSON.stringify(allData));
    document.getElementById("success").style.display = "block";
    setTimeout(()=>location.reload(),1500);
}

// 2. 核心数据分析函数
function showAnalysis(){
    const data = getSurveyList();
    const total = data.length;
    if(total === 0){
        alert("暂无答卷数据，请先填写提交问卷！");
        return;
    }
    document.getElementById("analysisPanel").style.display = "block";
    document.getElementById("totalNum").innerText = `当前有效答卷总数：${total} 份`;

    // 统计1：年级分布
    const gradeCount = {大一:0,大二:0,大三:0,大四:0};
    data.forEach(item=>gradeCount[item.grade]++);
    let gradeHtml = `<div class="analysis-title">1. 年级分布统计</div><table><tr><th>年级</th><th>人数</th><th>占比</th></tr>`;
    for(let key in gradeCount){
        let rate = (gradeCount[key]/total*100).toFixed(2)+"%";
        gradeHtml += `<tr><td>${key}</td><td>${gradeCount[key]}</td><td>${rate}</td></tr>`;
    }
    gradeHtml += `</table>`;
    document.getElementById("gradeTable").innerHTML = gradeHtml;

    // 统计2：每周课时长
    const timeCount = {"0-5h":0,"5-10h":0,"10-15h":0,"15h以上":0};
    data.forEach(item=>timeCount[item.time]++);
    let timeHtml = `<div class="analysis-title">2. 每周线上课时长统计</div><table><tr><th>时长区间</th><th>人数</th><th>占比</th></tr>`;
    for(let key in timeCount){
        let rate = (timeCount[key]/total*100).toFixed(2)+"%";
        timeHtml += `<tr><td>${key}</td><td>${timeCount[key]}</td><td>${rate}</td></tr>`;
    }
    timeHtml += `</table>`;
    document.getElementById("timeTable").innerHTML = timeHtml;

    // 统计3：学习效果自评
    const effectCount = {很差:0,一般:0,良好:0,优秀:0};
    data.forEach(item=>effectCount[item.effect]++);
    let effectHtml = `<div class="analysis-title">3. 学习效果自评统计</div><table><tr><th>评价等级</th><th>人数</th><th>占比</th></tr>`;
    for(let key in effectCount){
        let rate = (effectCount[key]/total*100).toFixed(2)+"%";
        effectHtml += `<tr><td>${key}</td><td>${effectCount[key]}</td><td>${rate}</td></tr>`;
    }
    effectHtml += `</table>`;
    document.getElementById("effectTable").innerHTML = effectHtml;

    // 统计4：多选阻碍因素
    const blockCount = {"网络卡顿":0,"自制力差":0,"互动不足":0,"设备问题":0};
    data.forEach(item=>{
        item.blockList.forEach(val=>blockCount[val]++)
    });
    let blockTotal = Object.values(blockCount).reduce((a,b)=>a+b,0);
    let blockHtml = `<div class="analysis-title">4. 学习阻碍因素统计（多选总次数：${blockTotal}）</div><table><tr><th>阻碍原因</th><th>选择次数</th><th>占总选择比例</th></tr>`;
    for(let key in blockCount){
        let rate = blockTotal>0 ? (blockCount[key]/blockTotal*100).toFixed(2)+"%" : "0%";
        blockHtml += `<tr><td>${key}</td><td>${blockCount[key]}</td><td>${rate}</td></tr>`;
    }
    blockHtml += `</table>`;
    document.getElementById("blockTable").innerHTML = blockHtml;
}

// 3. 导出数据文件（下载json文件，可直接粘贴进Excel做数据分析）
function exportDataFile(){
    const data = getSurveyList();
    if(data.length === 0){
        alert("没有答卷数据可导出！");
        return;
    }
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "问卷答卷数据.json";
    a.click();
}
</script>
</body>
</html>
