<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大学生AI工具使用调查问卷</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="max-width:700px;">
    <h2 class="text-center mb-4">大学生AI工具使用情况调查问卷</h2>
    <form action="/submit" method="post">
        <div class="mb-3">
            <label>姓名</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>性别</label><br>
            <input type="radio" name="gender" value="男" required> 男
            <input type="radio" name="gender" value="女"> 女
        </div>
        <div class="mb-3">
            <label>年龄段</label>
            <select name="age" class="form-select">
                <option value="18以下">18岁以下</option>
                <option value="18-20">18-20岁</option>
                <option value="21-23">21-23岁</option>
                <option value="24以上">24岁以上</option>
            </select>
        </div>
        <div class="mb-3">
            <label>所学专业</label>
            <input type="text" name="major" class="form-control">
        </div>
        <div class="mb-3">
            <label>使用AI工具频率</label>
            <select name="ai_use_freq" class="form-select">
                <option value="几乎不用">几乎不用</option>
                <option value="每周1-3次">每周1-3次</option>
                <option value="每天使用">每天使用</option>
            </select>
        </div>
        <div class="mb-3">
            <label>常用AI工具（多选）</label><br>
            <input type="checkbox" name="ai_tool" value="豆包">豆包
            <input type="checkbox" name="ai_tool" value="ChatGPT">ChatGPT
            <input type="checkbox" name="ai_tool" value="文心一言">文心一言
            <input type="checkbox" name="ai_tool" value="AI绘图">AI绘图工具
        </div>
        <div class="mb-3">
            <label>AI工具满意度</label>
            <select name="ai_satisfaction" class="form-select">
                <option value="很不满意">很不满意</option>
                <option value="一般">一般</option>
                <option value="满意">满意</option>
                <option value="非常满意">非常满意</option>
            </select>
        </div>
        <div class="mb-3">
            <label>改进建议</label>
            <textarea name="suggest" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">提交问卷</button>
    </form>
</body>
</html>
